openapi: 3.1.0
info:
  title: GPU Hub Control Plane API
  version: 0.2.0
  description: |
    Backend contract for the GPU Workload Submission & Management Platform.
    Includes auth, workload lifecycle, admin resources, team membership, and quota management.
servers:
  - url: /api
security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Workloads
  - name: Models
  - name: Configs
  - name: Environments
  - name: Users
  - name: Teams
  - name: Quotas
  - name: GPUs

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login user and return JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'

  /me:
    get:
      tags: [Auth]
      summary: Current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /workloads:
    get:
      tags: [Workloads]
      summary: List workloads
      description: USER gets team workloads. ADMIN gets all workloads.
      responses:
        '200':
          description: Workload list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workload'
    post:
      tags: [Workloads]
      summary: Create workload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkloadRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workload'
        '409':
          description: Quota exceeded
          content:
            application/json:
              schema:
                type: object
                required: [message, details]
                properties:
                  message:
                    type: string
                  details:
                    type: object
                    required: [violations]
                    properties:
                      violations:
                        type: array
                        items:
                          $ref: '#/components/schemas/QuotaViolation'

  /workloads/{id}:
    get:
      tags: [Workloads]
      summary: Get workload detail
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Workload detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workload'

  /workloads/{id}/stop:
    post:
      tags: [Workloads]
      summary: Gracefully stop workload
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Updated workload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workload'

  /workloads/{id}/kill:
    post:
      tags: [Workloads]
      summary: Force kill workload (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Updated workload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workload'

  /models:
    get:
      tags: [Models]
      summary: List models
      responses:
        '200':
          description: Models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Model'
    post:
      tags: [Models]
      summary: Create model (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Model'
      responses:
        '201':
          description: Model created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'

  /models/{id}:
    patch:
      tags: [Models]
      summary: Update model (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelPatch'
      responses:
        '200':
          description: Model updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'

  /llm-configs:
    get:
      tags: [Configs]
      summary: List config schemas
      responses:
        '200':
          description: Configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LLMConfigSchema'
    post:
      tags: [Configs]
      summary: Create config schema (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LLMConfigSchema'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMConfigSchema'

  /llm-configs/{id}:
    patch:
      tags: [Configs]
      summary: Update config schema (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMConfigSchema'

  /environments:
    get:
      tags: [Environments]
      summary: List environments
      responses:
        '200':
          description: Environments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Environment'
    post:
      tags: [Environments]
      summary: Create environment (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Environment'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'

  /environments/{id}:
    patch:
      tags: [Environments]
      summary: Update environment (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'

  /users:
    get:
      tags: [Users]
      summary: List users (ADMIN)
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags: [Users]
      summary: Create user (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    patch:
      tags: [Users]
      summary: Update user (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /teams:
    get:
      tags: [Teams]
      summary: List team summaries
      responses:
        '200':
          description: Team summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamSummary'
    post:
      tags: [Teams]
      summary: Create team (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

  /teams/{id}:
    get:
      tags: [Teams]
      summary: Team detail with members, active workloads, quota summary
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Team detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetailResponse'
    patch:
      tags: [Teams]
      summary: Update team (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamPatch'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

  /teams/{id}/members:
    post:
      tags: [Teams]
      summary: Assign/move user to team (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, MEMBER]
      responses:
        '201':
          description: Membership upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMember'

  /teams/{id}/members/{userId}:
    delete:
      tags: [Teams]
      summary: Remove user from team (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Removed

  /quotas:
    get:
      tags: [Quotas]
      summary: List quotas (ADMIN)
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [TEAM, USER]
      responses:
        '200':
          description: Quotas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Quota'
    post:
      tags: [Quotas]
      summary: Create quota (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Quota'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quota'

  /quotas/{id}:
    patch:
      tags: [Quotas]
      summary: Update quota (ADMIN)
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quota'

  /quotas/effective:
    get:
      tags: [Quotas]
      summary: Effective quota + usage for current user
      responses:
        '200':
          description: Effective quota view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectiveQuotaView'

  /quotas/usage:
    get:
      tags: [Quotas]
      summary: Live usage by scope and scopeId
      parameters:
        - name: scope
          in: query
          required: true
          schema:
            type: string
            enum: [TEAM, USER]
        - name: scopeId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota usage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaUsage'

  /gpus:
    get:
      tags: [GPUs]
      summary: List GPU inventory
      responses:
        '200':
          description: GPUs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GPU'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    User:
      type: object
      required: [id, username, email, role, active, teamId, createdAt]
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string, format: email }
        role:
          type: string
          enum: [USER, ADMIN]
        active: { type: boolean }
        teamId: { type: string }
        createdAt: { type: string, format: date-time }

    UserCreate:
      type: object
      required: [username, email, role, teamId]
      properties:
        username: { type: string }
        email: { type: string, format: email }
        role:
          type: string
          enum: [USER, ADMIN]
        teamId: { type: string }

    UserPatch:
      type: object
      properties:
        role:
          type: string
          enum: [USER, ADMIN]
        active: { type: boolean }
        teamId: { type: string }

    Team:
      type: object
      required: [id, name, description, ownerId, createdAt, active]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        ownerId: { type: string }
        createdAt: { type: string, format: date-time }
        active: { type: boolean }

    TeamCreate:
      type: object
      required: [name, description]
      properties:
        name: { type: string }
        description: { type: string }
        ownerId: { type: string }

    TeamPatch:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        active: { type: boolean }

    TeamMember:
      type: object
      required: [teamId, userId, role, joinedAt]
      properties:
        teamId: { type: string }
        userId: { type: string }
        role:
          type: string
          enum: [ADMIN, MEMBER]
        joinedAt: { type: string, format: date-time }

    TeamSummary:
      allOf:
        - $ref: '#/components/schemas/Team'
        - type: object
          required: [membersCount, activeWorkloads, usedGPU]
          properties:
            membersCount: { type: integer }
            activeWorkloads: { type: integer }
            usedGPU: { type: integer }

    Quota:
      type: object
      required: [id, scope, scopeId, limits, burst, enforced, updatedAt]
      properties:
        id: { type: string }
        scope:
          type: string
          enum: [TEAM, USER]
        scopeId: { type: string }
        limits:
          type: object
          required: [maxRunningWorkloads, maxGPU, maxCPU, maxMemoryGB]
          properties:
            maxRunningWorkloads: { type: integer }
            maxGPU: { type: integer }
            maxGPUByModel:
              type: object
              additionalProperties:
                type: integer
            maxCPU: { type: integer }
            maxMemoryGB: { type: integer }
        burst:
          type: object
          required: [allowBurst]
          properties:
            allowBurst: { type: boolean }
            burstGPU: { type: integer }
        enforced: { type: boolean }
        updatedAt: { type: string, format: date-time }

    QuotaUsage:
      type: object
      required: [runningWorkloads, usedGPU, usedCPU, usedMemoryGB]
      properties:
        runningWorkloads: { type: integer }
        usedGPU: { type: integer }
        usedCPU: { type: integer }
        usedMemoryGB: { type: integer }

    QuotaViolation:
      type: object
      required: [limit, scope, message, suggestion]
      properties:
        limit:
          type: string
          enum: [maxRunningWorkloads, maxGPU, maxGPUByModel, maxCPU, maxMemoryGB]
        scope:
          type: string
          enum: [TEAM, USER]
        message: { type: string }
        suggestion: { type: string }

    EffectiveQuotaView:
      type: object
      required: [team, userId, effectiveLimits, effectiveBurst, usage]
      properties:
        team:
          $ref: '#/components/schemas/Team'
        userId: { type: string }
        teamQuota:
          anyOf:
            - $ref: '#/components/schemas/Quota'
            - type: 'null'
        userQuota:
          anyOf:
            - $ref: '#/components/schemas/Quota'
            - type: 'null'
        effectiveLimits:
          $ref: '#/components/schemas/Quota/properties/limits'
        effectiveBurst:
          $ref: '#/components/schemas/Quota/properties/burst'
        usage:
          $ref: '#/components/schemas/QuotaUsage'

    CreateWorkloadRequest:
      type: object
      required: [name, type, resources]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [infer, train, research]
        resources:
          type: object
          required: [gpu, cpu, memGB]
          properties:
            gpu: { type: integer }
            gpuModel: { type: string }
            cpu: { type: integer }
            memGB: { type: integer }
        runtime:
          type: object
          properties:
            modelId: { type: string }
            configSchemaId: { type: string }
            configValues:
              type: object
              additionalProperties: true
            environmentId: { type: string }
            command: { type: string }

    Workload:
      type: object
      required:
        - id
        - name
        - type
        - ownerId
        - ownerName
        - teamId
        - teamName
        - status
        - createdAt
        - resources
        - runtime
        - usage
      properties:
        id: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [infer, train, research]
        ownerId: { type: string }
        ownerName: { type: string }
        teamId: { type: string }
        teamName: { type: string }
        status:
          type: string
          enum: [Pending, Running, Succeeded, Failed, Stopped, Preempted]
        createdAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        resources:
          $ref: '#/components/schemas/CreateWorkloadRequest/properties/resources'
        runtime:
          $ref: '#/components/schemas/CreateWorkloadRequest/properties/runtime'
        node: { type: string }
        gpuIds:
          type: array
          items: { type: string }
        usage:
          type: object
          properties:
            gpuUtil: { type: number }
            gpuMem: { type: number }
        notebookUrl: { type: string, format: uri }
        quotaViolations:
          type: array
          items:
            $ref: '#/components/schemas/QuotaViolation'

    TeamDetailResponse:
      type: object
      required: [team, members, activeWorkloads, usage]
      properties:
        team:
          $ref: '#/components/schemas/Team'
        members:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/TeamMember'
              - type: object
                required: [username, email, userRole, active]
                properties:
                  username: { type: string }
                  email: { type: string, format: email }
                  userRole:
                    type: string
                    enum: [USER, ADMIN]
                  active: { type: boolean }
        activeWorkloads:
          type: array
          items:
            $ref: '#/components/schemas/Workload'
        quota:
          anyOf:
            - $ref: '#/components/schemas/Quota'
            - type: 'null'
        usage:
          $ref: '#/components/schemas/QuotaUsage'

    Model:
      type: object
      required: [id, name, family, size, formats, defaultConfigId, enabled]
      properties:
        id: { type: string }
        name: { type: string }
        family:
          type: string
          enum: [LLaMA, Qwen, DeepSeek, Custom]
        size: { type: string }
        formats:
          type: array
          items:
            type: string
            enum: [hf, gguf, awq, gptq]
        defaultConfigId: { type: string }
        enabled: { type: boolean }

    ModelPatch:
      type: object
      properties:
        name: { type: string }
        family:
          type: string
          enum: [LLaMA, Qwen, DeepSeek, Custom]
        size: { type: string }
        formats:
          type: array
          items:
            type: string
            enum: [hf, gguf, awq, gptq]
        defaultConfigId: { type: string }
        enabled: { type: boolean }

    LLMConfigSchema:
      type: object
      required: [id, name, description, target, parameters, version, active]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        target:
          type: string
          enum: [vllm]
        parameters:
          type: array
          items:
            type: object
            required: [key, type, required, description]
            properties:
              key: { type: string }
              type:
                type: string
                enum: [string, number, boolean, enum]
              required: { type: boolean }
              default: {}
              description: { type: string }
              enumValues:
                type: array
                items:
                  type: string
        version: { type: integer }
        active: { type: boolean }

    Environment:
      type: object
      required: [id, name, type, image, description, enabled]
      properties:
        id: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [notebook, container]
        image: { type: string }
        description: { type: string }
        enabled: { type: boolean }

    GPU:
      type: object
      required: [id, nodeName, model, memoryGB, allocated]
      properties:
        id: { type: string }
        nodeName: { type: string }
        model: { type: string }
        memoryGB: { type: integer }
        allocated: { type: boolean }
        workloadId: { type: string }
        owner: { type: string }
        utilization: { type: number }
        memUsedGB: { type: number }

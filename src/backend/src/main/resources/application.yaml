spring:
  application:
    name: gpu-hub-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gpu-hub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:update}

jwt:
  secret: ${JWT_SECRET:A0adcU92dc7DOhOv8xXmpUuZwHmAhhW7OjCe2YdQn3A=}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800}

server:
  port: 9000

logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.bind: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
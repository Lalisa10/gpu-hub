spring:
  application:
    name: gpu-hub-backend
  sql:
    init:
      schema-locations: classpath:schema_v4.sql
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gpu-hub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:update}

object-storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}

kubernetes:
  kubeconfig-bucket: ${KUBERNETES_KUBECONFIG_BUCKET:kubeconfig}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  bootstrap:
    admin:
      username: ${ADMIN_BOOTSTRAP_USERNAME:admin}
      email: ${ADMIN_BOOTSTRAP_EMAIL:admin@gmail.com.vn}
      password: ${ADMIN_BOOTSTRAP_PASSWORD:admin}

jwt:
  secret: ${JWT_SECRET:A0adcU92dc7DOhOv8xXmpUuZwHmAhhW7OjCe2YdQn3A=}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800}

server:
  port: 8080

logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.bind: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

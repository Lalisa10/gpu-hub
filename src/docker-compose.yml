services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # --- Database ---
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/gpu-hub}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      HIBERNATE_DDL: ${HIBERNATE_DDL:-update}

      # --- Object storage (MinIO) ---
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}

      # --- Kubernetes ---
      KUBERNETES_KUBECONFIG_BUCKET: ${KUBERNETES_KUBECONFIG_BUCKET:-kubeconfig}

      # --- JWT ---
      JWT_SECRET: ${JWT_SECRET:-A0adcU92dc7DOhOv8xXmpUuZwHmAhhW7OjCe2YdQn3A=}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800}

      # --- App ---
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@gmail.com.vn}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-admin}

      # --- JVM ---
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      # Hostname/port the rendered nginx.conf points its upstream at.
      # Defaults match the compose service ("backend:8080"); override for K8s.
      BACKEND_HOST: ${FRONTEND_BACKEND_HOST:-backend}
      BACKEND_PORT: ${FRONTEND_BACKEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres-data:
  minio-data:
